name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy-frontend:
    name: Deploy Frontend (Vercel)
    runs-on: ubuntu-latest
    if: |
      contains(toJson(github.event.commits.*.modified + github.event.commits.*.added + github.event.commits.*.removed), 'frontend/')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install -g vercel@latest
      - run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: frontend
        env:
          VERCEL_ORG_ID: team_8KloincKc12feu3HqoGUlX54
          VERCEL_PROJECT_ID: prj_qTqBSeBRLAo2aCRbRxcJCfbD7op5
      - run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: frontend
        env:
          VERCEL_ORG_ID: team_8KloincKc12feu3HqoGUlX54
          VERCEL_PROJECT_ID: prj_qTqBSeBRLAo2aCRbRxcJCfbD7op5
      - run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: frontend
        env:
          VERCEL_ORG_ID: team_8KloincKc12feu3HqoGUlX54
          VERCEL_PROJECT_ID: prj_qTqBSeBRLAo2aCRbRxcJCfbD7op5

  deploy-backend:
    name: Deploy Backend (Railway)
    runs-on: ubuntu-latest
    if: |
      contains(toJson(github.event.commits.*.modified + github.event.commits.*.added + github.event.commits.*.removed), 'backend/')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install -g @railway/cli
      - run: railway up --service 87a9915b-d1d3-4e9d-b5b0-d45a54bc3940 --detach
        working-directory: backend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
